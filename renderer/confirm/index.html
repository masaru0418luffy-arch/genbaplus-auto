<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>投稿内容の確認</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    background: #f5f5f5;
    color: #333;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .header {
    background: #2e7d32;
    color: white;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .header .icon { font-size: 22px; }
  .header h1 { font-size: 16px; font-weight: 600; }
  .header .badge {
    background: rgba(255,255,255,0.25);
    padding: 2px 10px;
    border-radius: 12px;
    font-size: 12px;
    margin-left: auto;
  }

  .content { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }

  .field label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }

  .field-value {
    background: white;
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 14px;
  }

  textarea#message {
    width: 100%;
    background: white;
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 12px 14px;
    font-size: 14px;
    line-height: 1.7;
    resize: vertical;
    min-height: 180px;
    font-family: inherit;
    color: #333;
  }
  textarea#message:focus { outline: none; border-color: #2e7d32; }

  .edit-hint {
    font-size: 11px;
    color: #888;
    margin-top: 4px;
  }

  .footer {
    padding: 16px 20px;
    background: white;
    border-top: 1px solid #e0e0e0;
    display: flex;
    gap: 10px;
    justify-content: flex-end;
  }

  button {
    padding: 10px 24px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    border: none;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  button:hover { opacity: 0.85; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-cancel {
    background: #f0f0f0;
    color: #555;
  }
  .btn-post {
    background: #2e7d32;
    color: white;
    min-width: 120px;
  }

  /* 投稿中・完了・エラー状態 */
  .status-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(255,255,255,0.92);
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    font-size: 16px;
    font-weight: 600;
  }
  .status-overlay.visible { display: flex; }
  .spinner {
    width: 40px; height: 40px;
    border: 4px solid #e0e0e0;
    border-top-color: #2e7d32;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .success-icon { font-size: 48px; }
  .error-msg { color: #c62828; font-size: 13px; max-width: 360px; text-align: center; }
</style>
</head>
<body>

<div class="header">
  <span class="icon">📋</span>
  <h1>現場Plus 投稿内容の確認</h1>
  <span class="badge" id="type-badge">週次</span>
</div>

<div class="content">
  <div class="field">
    <label>投稿先</label>
    <div class="field-value">標準納まり・全体連絡事項</div>
  </div>

  <div class="field">
    <label>タイトル</label>
    <div class="field-value" id="title-display">—</div>
  </div>

  <div class="field">
    <label>本文</label>
    <textarea id="message" placeholder="メッセージ内容"></textarea>
    <div class="edit-hint">✏️ 内容は直接編集できます</div>
  </div>
</div>

<div class="footer">
  <button class="btn-cancel" id="btn-cancel">キャンセル</button>
  <button class="btn-post" id="btn-post">✅ この内容で投稿する</button>
</div>

<!-- 状態オーバーレイ -->
<div class="status-overlay" id="overlay">
  <div class="spinner" id="spinner"></div>
  <div id="overlay-text">現場Plusに投稿中...</div>
  <div class="error-msg" id="error-msg" style="display:none"></div>
  <button id="btn-close-overlay" style="display:none; background:#2e7d32; color:white; margin-top:8px;" onclick="window.close()">閉じる</button>
</div>

<script>
  const api = window.electronAPI;

  // 投稿データを受け取ってUIに反映
  api.onSetPostData(({ title, message, type }) => {
    document.getElementById('title-display').textContent = title;
    document.getElementById('message').value = message;
    document.getElementById('type-badge').textContent = type === 'weekly' ? '週次' : '月次';
  });

  // 投稿ボタン
  document.getElementById('btn-post').addEventListener('click', () => {
    const editedMessage = document.getElementById('message').value;
    api.postConfirmed(editedMessage);
  });

  // キャンセルボタン
  document.getElementById('btn-cancel').addEventListener('click', () => {
    api.postCancelled();
    window.close();
  });

  // 投稿中
  api.onPostingStarted(() => {
    document.getElementById('overlay').classList.add('visible');
    document.getElementById('overlay-text').textContent = '現場Plusに投稿中...';
    document.getElementById('spinner').style.display = 'block';
  });

  // 投稿成功
  api.onPostingSuccess(() => {
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('overlay-text').textContent = '✅ 投稿が完了しました！';
    document.getElementById('btn-close-overlay').style.display = 'block';
  });

  // 投稿エラー
  api.onPostingError((errMsg) => {
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('overlay-text').textContent = '❌ 投稿に失敗しました';
    document.getElementById('error-msg').style.display = 'block';
    document.getElementById('error-msg').textContent = errMsg;
    document.getElementById('btn-close-overlay').style.display = 'block';
  });
</script>
</body>
</html>
