<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>設定 | 現場Plus 自動投稿</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', 'Hiragino Sans', sans-serif;
    background: #f0f2f5;
    min-height: 100vh;
    color: #333;
  }
  .header {
    background: #37474f;
    color: white;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  .header a { color: rgba(255,255,255,0.7); text-decoration: none; font-size: 13px; }
  .header h1 { font-size: 17px; font-weight: 700; }

  .container { max-width: 560px; margin: 32px auto; padding: 0 16px; }

  .card {
    background: white;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    margin-bottom: 20px;
  }
  .card-title {
    padding: 12px 20px;
    font-size: 11px;
    font-weight: 700;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    background: #fafafa;
    border-bottom: 1px solid #f0f0f0;
  }

  .field {
    padding: 14px 20px;
    display: flex;
    align-items: center;
    border-bottom: 1px solid #f5f5f5;
  }
  .field:last-child { border-bottom: none; }
  .field label {
    flex: 0 0 140px;
    font-size: 13px;
    font-weight: 500;
    color: #555;
  }
  .field input {
    flex: 1;
    border: 1px solid #e0e0e0;
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 13px;
    font-family: inherit;
    color: #333;
    background: white;
  }
  .field input:focus { outline: none; border-color: #37474f; }

  .hint {
    padding: 10px 20px 14px;
    font-size: 11px;
    color: #aaa;
    line-height: 1.6;
  }

  .footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 0;
  }
  .save-msg { font-size: 13px; color: #2e7d32; }
  .error-msg { font-size: 13px; color: #c62828; }

  .btn-save {
    padding: 10px 28px;
    background: #37474f;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  .btn-save:hover { background: #263238; }
</style>
</head>
<body>

<div class="header">
  <a href="/">← 戻る</a>
  <h1>⚙️ 設定</h1>
</div>

<div class="container">

  <div class="card">
    <div class="card-title">現場Plus ログイン情報</div>
    <div class="field">
      <label>サーバーURL</label>
      <input type="text" id="url" placeholder="https://apg.kensetsu-cloud.jp">
    </div>
    <div class="field">
      <label>テナントID</label>
      <input type="text" id="tenantId" placeholder="例：X572D51">
    </div>
    <div class="field">
      <label>ログインID</label>
      <input type="text" id="loginId" placeholder="例：staff01@example.com">
    </div>
    <div class="field">
      <label>パスワード</label>
      <input type="password" id="password" placeholder="パスワード">
    </div>
    <div class="hint">
      ※ ログイン情報はサーバーのみに保存されます。
    </div>
  </div>

  <div class="card">
    <div class="card-title">スケジュール設定</div>
    <div class="field">
      <label>週次 基準日</label>
      <input type="date" id="weeklyBaseDate">
    </div>
    <div class="hint">
      週次投稿は「基準日から4週間ごとの金曜日」に実行されます。<br>
      月次投稿は「毎月最終金曜日」に自動で実行されます。<br>
      いずれも毎週金曜14:50に確認ページが更新されます。
    </div>
  </div>

  <div class="card">
    <div class="card-title">管理パスワード</div>
    <div class="field">
      <label>管理パスワード</label>
      <input type="password" id="adminPassword" placeholder="設定変更時に必要なパスワード">
    </div>
    <div class="hint">
      設定を保存するには管理パスワードが必要です。<br>
      初期値は Railway の環境変数 ADMIN_PASSWORD で設定します。
    </div>
  </div>

  <div class="footer">
    <span id="msg"></span>
    <button class="btn-save" onclick="save()">保存</button>
  </div>

</div>

<script>
async function load() {
  const res = await fetch('/api/settings');
  const s = await res.json();
  document.getElementById('url').value = s.url || '';
  document.getElementById('tenantId').value = s.tenantId || '';
  document.getElementById('loginId').value = s.loginId || '';
  document.getElementById('password').value = s.password || '';
  document.getElementById('weeklyBaseDate').value = s.weeklyBaseDate || '2026-07-03';
}

async function save() {
  const adminPassword = document.getElementById('adminPassword').value;
  if (!adminPassword) {
    showMsg('管理パスワードを入力してください', 'error');
    return;
  }

  const settings = {
    adminPassword,
    url: document.getElementById('url').value.trim(),
    tenantId: document.getElementById('tenantId').value.trim(),
    loginId: document.getElementById('loginId').value.trim(),
    password: document.getElementById('password').value,
    weeklyBaseDate: document.getElementById('weeklyBaseDate').value
  };

  const res = await fetch('/api/settings', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(settings)
  });
  const data = await res.json();

  if (data.ok) {
    showMsg('✅ 保存しました', 'ok');
  } else {
    showMsg('❌ ' + (data.error || '保存に失敗しました'), 'error');
  }
}

function showMsg(text, type) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = type === 'error' ? 'error-msg' : 'save-msg';
  setTimeout(() => { el.textContent = ''; }, 3000);
}

load();
</script>
</body>
</html>
